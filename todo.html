<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo planner</title>
    <link rel="stylesheet" type="text/css" href="todo.css">
</head>
<body>
    <main>
        <h1>TO DO LIST</h1><br>
        <section id="inputSection">
            <input placeholder="Write yout task here" type="text" name="todo" id="input">
            <button id="submitBtn">Add</button>
        </section>
        <br>

        <section id="list-container">
            <h2>TASKS</h2>
            <div id="listdiv">
                <ul id="todo-list">
                    
                </ul>
            </div>
        </section>
    </main>




<!-- SCRIPT -->
    <script src="todo.js"></script>
</body>
</html>
